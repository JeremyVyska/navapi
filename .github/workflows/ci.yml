name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: build · lint · test (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm lint

      - run: pnpm test
        env:
          # never touch a runner's real keychain
          NAVAPI_SECRET_BACKEND: file

  package-vsix:
    name: package extension (.vsix)
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm --filter navapi-vscode package

      - uses: actions/upload-artifact@v4
        with:
          name: navapi-vscode-vsix
          path: packages/vscode/*.vsix
          if-no-files-found: error
